<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Speemail{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.0" integrity="sha384-wS5l5IKJBvK6sPTKa2WZ1js3d947pvWXbPJ1OmWfEuxLgeHcEbjUUA5i9V5ZkpCw" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/static/style.css" />
  <meta name="current-path" content="{{ request.url.path }}" />
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">
      <span class="nav-logo">⚡</span>
      <span class="nav-title">Speemail</span>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Home</a>
      <a href="/inbox" class="nav-link {% if request.url.path == '/inbox' %}active{% endif %}">Inbox</a>
      <a href="/tasks" class="nav-link {% if request.url.path == '/tasks' %}active{% endif %}">Tasks</a>
      <a href="/queue" class="nav-link {% if request.url.path == '/queue' %}active{% endif %}">AI Queue</a>
      <a href="/history" class="nav-link {% if request.url.path == '/history' %}active{% endif %}">History</a>
      <a href="/settings" class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">Settings</a>
    </div>
    <div class="nav-actions">
      <button
        class="btn btn-sm btn-secondary"
        hx-post="/api/v1/scheduler/trigger"
        hx-target="#toast-container"
        hx-swap="beforeend"
        hx-indicator="#check-spinner">
        <span id="check-spinner" class="htmx-indicator spinner-inline"></span>
        Check Now
      </button>
      <button class="btn btn-sm btn-ghost" onclick="toggleChat()" title="AI Assistant (\)">💬</button>
      <button class="btn btn-sm btn-ghost" onclick="toggleShortcutsHelp()" title="Keyboard shortcuts (?)">⌨</button>
      <span id="auth-badge"
        hx-get="/auth/status"
        hx-trigger="load"
        hx-swap="outerHTML">
        <span class="badge badge-gray">…</span>
      </span>
    </div>
  </nav>

  <div id="toast-container" class="toast-container"></div>

  <main class="main {% block page_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <div id="modal-container"></div>

  <!-- Chat panel (always in DOM, toggled via CSS class) -->
  <div id="chat-panel" class="chat-panel">
    <div class="chat-header">
      <span class="chat-title">💬 Speemail AI</span>
      <button class="chat-close-btn" onclick="toggleChat()" title="Close">✕</button>
    </div>
    <div id="chat-messages" class="chat-messages"
      hx-get="/api/v1/chat/messages"
      hx-trigger="chat-open once"
      hx-swap="innerHTML"
      hx-on::after-request="scrollChatToBottom()">
    </div>
    <form class="chat-input-form"
      hx-post="/api/v1/chat"
      hx-target="#chat-messages"
      hx-swap="beforeend"
      hx-indicator="#chat-spinner"
      hx-on::after-request="this.reset(); scrollChatToBottom()">
      <input class="chat-input" type="text" name="message" placeholder="Ask me anything…" autocomplete="off" />
      <span id="chat-spinner" class="htmx-indicator spinner spinner-inline"></span>
      <button class="btn btn-primary btn-sm" type="submit">Send</button>
    </form>
  </div>

  <script src="/static/keyboard.js"></script>
  <script>
    // Close modal when clicking backdrop
    document.addEventListener('click', function(e) {
      const modal = document.querySelector('dialog[open]');
      if (modal && e.target === modal) modal.close();
    });
    // Auto-open dialog when HTMX injects it
    document.body.addEventListener('htmx:afterSwap', function(e) {
      const dialog = e.detail.target.querySelector('dialog');
      if (dialog && !dialog.open) dialog.showModal();
    });
    function toggleShortcutsHelp() {
      document.dispatchEvent(new KeyboardEvent('keydown', { key: '?' }));
    }

    // Chat panel
    function toggleChat() {
      const panel = document.getElementById('chat-panel');
      const isOpen = panel.classList.toggle('chat-open');
      if (isOpen) {
        htmx.trigger(document.getElementById('chat-messages'), 'chat-open');
        setTimeout(() => panel.querySelector('.chat-input')?.focus(), 100);
      }
    }

    function scrollChatToBottom() {
      const msgs = document.getElementById('chat-messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }
  </script>
</body>
</html>

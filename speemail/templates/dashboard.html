{% extends "base.html" %}
{% block title %}Queue — Speemail{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Approval Queue</h1>
  <p class="page-subtitle">Review AI-drafted emails before they're sent.</p>
</div>

<div
  id="pending-queue"
  hx-get="/api/v1/emails/pending"
  hx-trigger="load, every 60s"
  hx-swap="innerHTML"
  hx-indicator="#queue-spinner">
  <div class="loading-state">
    <span class="spinner"></span> Loading emails…
  </div>
</div>

<span id="queue-spinner" class="htmx-indicator loading-overlay">
  <span class="spinner"></span>
</span>
{% endblock %}

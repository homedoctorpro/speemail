{% extends "base.html" %}
{% block title %}Inbox — Speemail{% endblock %}
{% block page_class %}main-inbox{% endblock %}

{% block content %}
<div class="inbox-layout">

  <!-- Left pane: message list -->
  <div class="inbox-list-pane" id="inbox-list-pane">

    <div class="inbox-toolbar">
      <h2 class="inbox-folder-title">Inbox</h2>
      <div class="inbox-toolbar-right">
        <button id="compose-btn" class="btn btn-primary btn-sm"
          hx-get="/partials/compose"
          hx-target="#modal-container"
          hx-swap="innerHTML">
          Compose
        </button>
      </div>
    </div>

    <div class="inbox-filter-bar">
      <button class="inbox-filter-btn active" id="filter-all"
        onclick="setInboxFilter('all')">All</button>
      <button class="inbox-filter-btn" id="filter-needs-reply"
        onclick="setInboxFilter('needs-reply')">Needs My Reply</button>
      <button class="inbox-filter-btn" id="filter-awaiting"
        onclick="setInboxFilter('awaiting')">Awaiting Response</button>
    </div>

    <!-- All three tab contents loaded in parallel on page load -->
    <div id="inbox-tab-all"
      hx-get="/api/v1/inbox/messages"
      hx-trigger="load"
      hx-swap="innerHTML"
      hx-indicator="#inbox-spinner">
      <div class="loading-state"><span class="spinner"></span> Loading inbox…</div>
    </div>

    <div id="inbox-tab-needs-reply" style="display:none"
      hx-get="/api/v1/inbox/filter/needs-reply"
      hx-trigger="load"
      hx-swap="innerHTML">
      <div class="loading-state"><span class="spinner"></span> Loading…</div>
    </div>

    <div id="inbox-tab-awaiting" style="display:none"
      hx-get="/api/v1/inbox/filter/awaiting-response"
      hx-trigger="load"
      hx-swap="innerHTML">
      <div class="loading-state"><span class="spinner"></span> Loading…</div>
    </div>

    <span id="inbox-spinner" class="htmx-indicator loading-overlay">
      <span class="spinner"></span>
    </span>
  </div>

  <!-- Right pane: message detail -->
  <div class="inbox-detail-pane" id="message-detail-pane">
    <div class="detail-empty">
      <div class="empty-icon">📬</div>
      <div class="empty-title">Select a message</div>
      <div class="empty-body">Press <kbd>j</kbd>/<kbd>k</kbd> to navigate, <kbd>Enter</kbd> to open.</div>
    </div>
  </div>

</div>

<!-- Compose modal container -->
<div id="modal-container"></div>

<script>
  var _activeTab = 'all';
  var _tabIds = { 'all': 'inbox-tab-all', 'needs-reply': 'inbox-tab-needs-reply', 'awaiting': 'inbox-tab-awaiting' };
  var _btnIds  = { 'all': 'filter-all',   'needs-reply': 'filter-needs-reply',    'awaiting': 'filter-awaiting' };

  function setInboxFilter(tab) {
    if (tab === _activeTab) return;
    document.getElementById(_tabIds[_activeTab]).style.display = 'none';
    document.getElementById(_btnIds[_activeTab]).classList.remove('active');
    document.getElementById(_tabIds[tab]).style.display = '';
    document.getElementById(_btnIds[tab]).classList.add('active');
    _activeTab = tab;
  }

  // Called by the detail pane feedback buttons after a decision is recorded.
  // Duplicate row IDs exist across the All/Needs-Reply/Awaiting tabs, so we scope
  // queries by tab container and match on data-message-id (not getElementById).
  function onInboxFeedback(messageId, decision) {
    if (decision !== 'skip' && decision !== 'resolved') return;
    var sel = '[data-message-id="' + CSS.escape(messageId) + '"]';

    var nrTab = document.getElementById('inbox-tab-needs-reply');
    var nrRow = nrTab ? nrTab.querySelector(sel) : null;
    if (nrRow) nrRow.remove();

    // Drop the amber "needs reply" tint in the All tab so the row stops flagging.
    var allTab = document.getElementById('inbox-tab-all');
    var allRow = allTab ? allTab.querySelector(sel) : null;
    if (allRow) allRow.classList.remove('state-needs_reply');

    // If the user is currently on the needs-reply tab, clear the detail pane
    // because the message they just resolved is no longer in this list.
    if (_activeTab === 'needs-reply') {
      document.getElementById('message-detail-pane').innerHTML =
        '<div class="detail-empty"><div class="empty-title">Marked — no reply needed</div></div>';
      document.getElementById('inbox-list-pane').classList.remove('detail-open');
    }
  }

  // Once the "All" tab loads: open a specific message (?open=id) or auto-open the first one.
  (function () {
    const openId = new URLSearchParams(window.location.search).get('open');

    document.body.addEventListener('htmx:afterSwap', function handler(e) {
      if (e.detail.target.id !== 'inbox-tab-all') return;
      document.body.removeEventListener('htmx:afterSwap', handler);

      if (openId) {
        htmx.ajax('GET', '/api/v1/inbox/messages/' + encodeURIComponent(openId), {
          target: '#message-detail-pane',
          swap: 'innerHTML',
        });
        document.getElementById('inbox-list-pane').classList.add('detail-open');
        const row = document.getElementById('row-' + openId);
        if (row) row.classList.add('keyboard-focused');
      } else {
        const first = document.querySelector('#inbox-tab-all .message-row');
        if (first) first.click();
      }
    });
  })();
</script>
{% endblock %}

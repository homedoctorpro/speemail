<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Speemail</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; width: 100%; max-width: 360px; box-shadow: var(--shadow); }
    .login-logo { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
    .login-title { font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
    .login-sub { color: var(--text-muted); font-size: 0.875rem; text-align: center; margin-bottom: 1.75rem; }
    .login-form { display: flex; flex-direction: column; gap: 1rem; }
    .login-error { color: var(--red); font-size: 0.875rem; text-align: center; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">⚡</div>
      <div class="login-title">Speemail</div>
      <div class="login-sub">Enter your password to continue.</div>

      {% if error %}
        <div class="login-error">{{ error }}</div>
      {% endif %}

      <form class="login-form" method="post" action="/login">
        <input type="hidden" name="next" value="{{ next }}" />
        <input class="form-input" type="password" name="password"
          placeholder="Password" autofocus required />
        <button class="btn btn-primary" type="submit">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>

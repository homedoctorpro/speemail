<div id="task-{{ task.id }}" class="task-card {% if task.status == 'done' %}task-done{% endif %}">
  <div class="task-card-main">
    <span class="priority-dot priority-{{ task.priority }}" title="{{ task.priority }} priority"></span>
    <span class="task-card-title">{{ task.title }}</span>
    {% if task.due_date %}
      <span class="task-due">{{ task.due_date.strftime('%b %d') }}</span>
    {% endif %}
  </div>
  <div class="task-card-actions">
    <select class="task-status-select"
      name="status"
      hx-patch="/api/v1/tasks/{{ task.id }}"
      hx-target="#task-{{ task.id }}"
      hx-swap="outerHTML"
      hx-trigger="change"
      hx-include="this">
      <option value="todo" {% if task.status == 'todo' %}selected{% endif %}>To do</option>
      <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>In progress</option>
      <option value="done" {% if task.status == 'done' %}selected{% endif %}>Done</option>
    </select>
    <button class="btn btn-ghost btn-sm task-delete-btn"
      hx-delete="/api/v1/tasks/{{ task.id }}"
      hx-target="#task-{{ task.id }}"
      hx-swap="outerHTML"
      title="Delete">✕</button>
  </div>
</div>

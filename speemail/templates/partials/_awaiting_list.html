{% if emails %}
  {% for email in emails %}
    <div
      id="row-{{ email.graph_message_id }}"
      class="message-row"
      hx-get="/api/v1/inbox/messages/{{ email.graph_message_id }}"
      hx-target="#message-detail-pane"
      hx-swap="innerHTML"
      hx-on::after-request="document.getElementById('inbox-list-pane').classList.add('detail-open'); document.getElementById('row-{{ email.graph_message_id }}').classList.remove('unread')"
      data-message-id="{{ email.graph_message_id }}"
      tabindex="0">
      <div class="message-row-sender">To: {{ email.original_to | truncate(22, true, '') }}</div>
      <div class="message-row-subject">{{ email.original_subject or '(no subject)' | truncate(55, true, '…') }}</div>
      <div class="message-row-preview awaiting-badge">Awaiting response</div>
      <div class="message-row-meta">
        <span class="message-row-time">{{ email.sent_at | timeago }}</span>
      </div>
    </div>
  {% endfor %}
{% else %}
  <div class="empty-state">
    <div class="empty-icon">📭</div>
    <div class="empty-title">Nothing awaiting a response</div>
  </div>
{% endif %}
